# yamllint configuration for Kubernetes manifests.
# This config extends the default yamllint config and allows the Kubernetes
# community style for lists where list items are not indented relative to the
# parent key:
#
#   foo:
#   - bar
#   - baz
#
# This is installed to ~/.config/yamllint/config.kubernetes.yaml.

---
extends: ~/.config/yamllint/config

rules:
  indentation:
    spaces: 2
    # Allow Kubernetes-style indentless list items:
    #
    #   foo:
    #   - bar
    #   - baz
    indent-sequences: false
    check-multi-line-strings: false
