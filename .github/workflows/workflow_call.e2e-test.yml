name: e2e-test

on:
  workflow_call:

permissions:
  contents: read # Needed to check out the repo.

concurrency:
  group: e2e-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NVIM_VERSION: "v0.11.4"

jobs:
  # Test that a clean install works on Linux amd64.
  e2e-test-ubuntu2404-matrix:
    name: e2e-test-ubuntu2404-matrix

    strategy:
      matrix:
        platform:
          - ubuntu-24.04 # amd64
          - ubuntu-24.04-arm # arm64
      fail-fast: false

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              coreutils \
              gawk \
              grep \
              libffi-dev \
              liblzma-dev \
              libreadline-dev \
              libsqlite3-dev \
              libssl-dev \
              libyaml-dev \
              make \
              util-linux \
              zlib1g-dev

      - name: e2e-test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: E2E_HOME="${HOME}" make clean e2e-test

      - name: Load .bashrc
        run: |
          set -ueo pipefail

          # shellcheck source=/dev/null
          source "${HOME}/.bashrc"

  # Test that a clean install works on MacOS.
  e2e-test-macos26-arm64:
    name: e2e-test-macos26-arm64
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      # NOTE: Homebrew/actions does not publish tags.
      - uses: Homebrew/actions/setup-homebrew@d0dd492210067c1b5f8857ab6c5dd52c29944e44 # main

      - name: Install GNU tools
        run: |
          brew install \
              make \
              gawk \
              gnu-getopt \
              grep \
              coreutils \
              bash-completion \
              libyaml \
              xz \
              tmux

      - name: e2e-test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: E2E_HOME="${HOME}" gmake clean e2e-test

      - name: Load .bashrc
        run: |
          # shellcheck source=/dev/null
          source "${HOME}/.bashrc"

  # NOTE: needed for protected branch checks.
  e2e-test:
    name: e2e-test
    runs-on: ubuntu-latest
    needs:
      - e2e-test-ubuntu2404-matrix
      - e2e-test-macos26-arm64
    if: ${{ always() }}
    env:
      E2E_TEST_UBUNTU_MATRIX_RESULT: ${{ needs.e2e-test-ubuntu2404-matrix.result }}
      E2E_TEST_MACOS_ARM64_RESULT: ${{ needs.e2e-test-macos26-arm64.result }}
    steps:
      - run: |
          [ "${E2E_TEST_UBUNTU_MATRIX_RESULT}" == "success" ]
          [ "${E2E_TEST_MACOS_ARM64_RESULT}" == "success" ]
