# yamlfmt configuration for Kubernetes manifests.
# See: https://github.com/google/yamlfmt/blob/main/docs/config-file.md
formatter:
  type: basic
  # Use Kubernetes community style: list items are not indented relative
  # to the parent key.
  #
  # foo:
  # - bar
  # - baz
  indentless_arrays: true
  retain_line_breaks: true
  eof_newline: true
